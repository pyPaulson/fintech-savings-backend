services:
  - type: web
    name: growfund-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        fromDatabase:
          name: growfund-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: EMAIL_ENABLED
        value: "false"
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: GOOGLE_CLIENT_SECRET
        value: ""
      - key: GOOGLE_REDIRECT_URI
        value: ""
      - key: GOOGLE_IOS_CLIENT_ID
        value: ""
      - key: GOOGLE_ANDROID_CLIENT_ID
        value: ""
      - key: GOOGLE_WEB_CLIENT_ID
        value: ""
      - key: GOOGLE_EXPO_CLIENT_ID
        value: ""
databases:
  - name: growfund-db
    plan: basic-256mb
    databaseName: growfund
    user: growfund
